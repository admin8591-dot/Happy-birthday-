<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Unlock My Heart 💖</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500&family=Parisienne&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            height: 100%;
            background: #0a0e2a;
            font-family: 'Cormorant Garamond', serif;
            color: #fff7f0;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        #app {
            position: relative;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
        }

        #stars {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 20%, #2b1750 0%, #0a0e2a 65%);
            z-index: 0;
        }
        .star {
            position: absolute;
            border-radius: 50%;
            background: #fff7f0;
            animation: twinkle 3s ease-in-out infinite;
        }
        @keyframes twinkle {
            0%,
            100% {
                opacity: 0.2;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.6);
            }
        }

        #fireworksCanvas {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .scene {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 5vh 5vw;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.9s ease, transform 0.9s ease;
            z-index: 1;
            transform: scale(0.96);
        }
        .scene.active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }
        .scene-text {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-weight: 500;
            font-size: clamp(1rem, 3.2vw, 1.8rem);
            color: #fff7f0;
            max-width: 640px;
            text-shadow: 0 0 20px rgba(234, 184, 176, 0.35);
            letter-spacing: 0.3px;
            margin-top: 0.6rem;
            line-height: 1.4;
        }
        .eyebrow {
            font-family: 'Poppins', sans-serif;
            font-weight: 300;
            font-size: 0.6rem;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: #eab8b0;
            opacity: 0.8;
            margin-bottom: 0.6rem;
        }
        .instruction {
            font-family: 'Poppins', sans-serif;
            font-weight: 300;
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            color: #eab8b0;
            opacity: 0.8;
            margin-top: 1rem;
            padding: 0.3rem 1.2rem;
            border: 1px solid rgba(234, 184, 176, 0.2);
            border-radius: 30px;
            background: rgba(234, 184, 176, 0.06);
            backdrop-filter: blur(2px);
            min-height: 2.4rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .instruction .icon {
            font-size: 1rem;
        }

        #progress {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 8px;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            transition: background 0.5s ease, transform 0.5s ease;
        }
        .dot.active {
            background: #e8c874;
            transform: scale(1.4);
            box-shadow: 0 0 14px rgba(232, 200, 116, 0.6);
        }
        .dot.done {
            background: rgba(232, 200, 116, 0.35);
        }

        #controls {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            display: flex;
            gap: 10px;
            opacity: 0;
            transition: opacity 0.6s ease;
        }
        #controls.show {
            opacity: 1;
        }
        .ctrl-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(6px);
            color: #fff7f0;
            font-family: 'Poppins', sans-serif;
            font-size: 0.55rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .ctrl-btn:active {
            transform: scale(0.94);
        }

        .next-btn {
            font-family: 'Poppins', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ff5f7e, #ff8fab);
            color: #fff;
            border: none;
            padding: 0.6rem 1.8rem;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(255, 95, 126, 0.35);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            margin-top: 0.8rem;
            position: relative;
            overflow: hidden;
            touch-action: manipulation;
        }
        .next-btn:active {
            transform: scale(0.94);
        }
        .next-btn .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            transform: scale(0);
            animation: rippleAnim 0.6s ease-out forwards;
        }
        @keyframes rippleAnim {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* ── Password Lock Scene ── */
        #scene0 {
            z-index: 5;
        }
        #scene0.active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }
        .lock-icon {
            font-size: 4.5rem;
            margin-bottom: 0.6rem;
            animation: pulseLock 1.8s ease-in-out infinite;
        }
        @keyframes pulseLock {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }
        .password-box {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            padding: 1.8rem 2rem 2rem;
            max-width: 380px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        .password-box h2 {
            font-family: 'Parisienne', cursive;
            font-size: 1.6rem;
            color: #e8c874;
            margin-bottom: 0.3rem;
        }
        .password-box .sub {
            font-family: 'Poppins', sans-serif;
            font-size: 0.65rem;
            color: #eab8b0;
            opacity: 0.7;
            letter-spacing: 0.1em;
            margin-bottom: 1.2rem;
        }
        .password-input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .password-input-group input {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            padding: 0.7rem 1rem;
            color: #fff7f0;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            text-align: center;
            letter-spacing: 0.2em;
            outline: none;
            transition: border-color 0.3s ease;
        }
        .password-input-group input:focus {
            border-color: #e8c874;
        }
        .password-input-group input::placeholder {
            color: rgba(255, 255, 255, 0.25);
            font-size: 0.7rem;
            letter-spacing: 0.1em;
        }
        .password-input-group .error-msg {
            font-family: 'Poppins', sans-serif;
            font-size: 0.6rem;
            color: #ff5f7e;
            min-height: 1.2rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .password-input-group .error-msg.show {
            opacity: 1;
        }
        .password-input-group .unlock-btn {
            font-family: 'Poppins', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            background: linear-gradient(135deg, #e8c874, #d4a84a);
            color: #0a0e2a;
            border: none;
            padding: 0.7rem;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            font-weight: 600;
        }
        .password-input-group .unlock-btn:active {
            transform: scale(0.96);
        }
        .password-input-group .unlock-btn:disabled {
            opacity: 0.5;
            transform: scale(0.98);
            pointer-events: none;
        }

        /* ── Calendar ── */
        .calendar {
            width: min(70vw, 220px);
            aspect-ratio: 1/1.1;
            background: linear-gradient(160deg, #fdf6ee, #f2e3d3);
            border-radius: 14px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(234, 184, 176, 0.25);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-bottom: 0.8rem;
            transition: transform 0.6s ease, box-shadow 0.6s ease;
            cursor: pointer;
            transform-style: preserve-3d;
            perspective: 800px;
            touch-action: manipulation;
        }
        .calendar.flipped {
            transform: rotateY(12deg) scale(1.02);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6), 0 0 60px rgba(234, 184, 176, 0.4);
        }
        .cal-top {
            background: #ff5f7e;
            color: #fff;
            font-family: 'Poppins', sans-serif;
